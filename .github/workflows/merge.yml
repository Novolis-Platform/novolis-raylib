# After CI succeeds on main: pack, push to GitHub Packages, bump build.
name: 'CI: main'

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: Novolis-Platform/novolis-workflows/actions/resolve-version@main
        id: ver

      - run: dotnet run --project codegen/Novolis.Raylib.Pipeline -- run step_01_source

      - name: Pack NuGet packages
        shell: pwsh
        run: ./scripts/pack-all.ps1 -Version ${{ steps.ver.outputs.version }}

      - uses: Novolis-Platform/novolis-workflows/actions/publish-github-packages@main

      - uses: Novolis-Platform/novolis-workflows/actions/bump-build-version@main
        id: bump

      - name: Commit build version bump
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .novolis/version.props
          git commit -m "chore: bump build to ${{ steps.bump.outputs.next_version }} [skip ci]"
          git push || echo "::warning::Could not push version bump (branch protection?)."
